<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Standup Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17; --surface: #131a2b; --card: #1a2236; --border: rgba(255,255,255,0.08);
  --text: #e8edf5; --text2: #7a8ba8; --text3: #4a5a75;
  --blue: #4a9eff; --purple: #8b5cf6; --green: #34d399; --yellow: #fbbf24; --red: #f87171; --orange: #fb923c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

.particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.particle { position: absolute; width: 2px; height: 2px; background: rgba(74,158,255,0.3); border-radius: 50%; animation: float linear infinite; }
@keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-20px) scale(1); opacity: 0; } }

.shake { animation: shake 0.4s ease-in-out; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px) rotate(-1deg)} 40%{transform:translateX(6px) rotate(1deg)} 60%{transform:translateX(-4px)} 80%{transform:translateX(2px)} }

.game-container { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; }

/* Header */
.game-header { text-align: center; padding: 6px 0 8px; }
.game-title { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.round-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--surface); border: 1px solid var(--border); color: var(--text2); margin-top: 4px; }

/* Stats */
.stats-bar { display: flex; gap: 6px; margin: 6px 0; }
.stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 4px; text-align: center; transition: all 0.3s; }
.stat-card.pulse { animation: statPulse 0.5s ease; }
@keyframes statPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
.stat-value { font-size: 20px; font-weight: 800; color: var(--blue); transition: color 0.3s; }
.stat-value.danger { color: var(--red); } .stat-value.warning { color: var(--yellow); } .stat-value.great { color: var(--green); }
.stat-label { font-size: 8px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 1px; }
.stat-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.06); margin-top: 4px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
.stat-bar-fill.morale { background: var(--green); } .stat-bar-fill.morale.warning { background: var(--yellow); } .stat-bar-fill.morale.danger { background: var(--red); }
.stat-bar-fill.sprint { background: var(--blue); } .stat-bar-fill.sprint.warning { background: var(--yellow); } .stat-bar-fill.sprint.danger { background: var(--red); }

/* Timer */
.timer-container { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.04); margin: 4px 0 8px; overflow: hidden; }
.timer-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width 0.15s linear; }
.timer-fill.urgent { background: linear-gradient(90deg, var(--red), var(--orange)); animation: timerPulse 0.5s infinite; }
@keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* Blocker card */
.blocker-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; position: relative; overflow: hidden; animation: cardEnter 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes cardEnter { 0%{transform:translateY(30px) scale(0.95);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }
.card-exit { animation: cardExit 0.3s ease-in forwards; }
@keyframes cardExit { to{transform:translateX(100px) rotate(5deg);opacity:0} }
.card-severity { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
.card-severity.critical { background: var(--red); box-shadow: 0 0 12px rgba(248,113,113,0.2); }
.card-severity.high { background: var(--yellow); } .card-severity.low { background: var(--green); }
.severity-tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.severity-tag.critical { background: rgba(248,113,113,0.12); color: var(--red); }
.severity-tag.high { background: rgba(251,191,36,0.12); color: var(--yellow); }
.severity-tag.low { background: rgba(52,211,153,0.12); color: var(--green); }

.blocker-person { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.avatar { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.avatar.dev { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
.avatar.ops { background: linear-gradient(135deg, #f59e0b, #ef4444); }
.avatar.qa { background: linear-gradient(135deg, #10b981, #06b6d4); }
.avatar.pm { background: linear-gradient(135deg, #ec4899, #f43f5e); }
.avatar.intern { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
.avatar.lead { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
.avatar.ceo { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
.person-info { flex: 1; min-width: 0; }
.person-name { font-size: 13px; font-weight: 600; }
.person-role { font-size: 11px; color: var(--text2); }
.blocker-text { font-size: 14px; line-height: 1.6; margin-bottom: 14px; overflow-wrap: break-word; }

/* Narrative ticker */
.narrative { background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.15); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px; color: var(--purple); font-style: italic; animation: narrativeFade 0.4s ease; }
@keyframes narrativeFade { from{opacity:0;transform:translateY(-8px)} }

/* Slack feed */
.slack-feed { margin-bottom: 10px; }
.slack-msg { display: flex; align-items: flex-start; gap: 6px; padding: 4px 0; font-size: 11px; color: var(--text2); animation: slackIn 0.3s ease; }
@keyframes slackIn { from{opacity:0;transform:translateX(-10px)} }
.slack-channel { color: var(--blue); font-weight: 600; flex-shrink: 0; }
.slack-user { font-weight: 600; color: var(--text); }

/* Actions */
.actions { display: flex; gap: 8px; }
.action-btn { flex: 1; padding: 11px 6px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 5px; -webkit-tap-highlight-color: transparent; }
.action-btn:active { transform: scale(0.96); }
.action-btn.resolve { border-color: rgba(52,211,153,0.3); color: var(--green); }
.action-btn.resolve:hover { background: rgba(52,211,153,0.1); border-color: var(--green); }
.action-btn.escalate { border-color: rgba(251,191,36,0.3); color: var(--yellow); }
.action-btn.escalate:hover { background: rgba(251,191,36,0.1); border-color: var(--yellow); }
.action-btn.ignore { border-color: rgba(248,113,113,0.2); color: var(--red); }
.action-btn.ignore:hover { background: rgba(248,113,113,0.08); border-color: var(--red); }
.kb-hints { display: flex; justify-content: center; gap: 20px; margin-top: 8px; font-size: 10px; color: var(--text3); }
.kb-key { display: inline-flex; align-items: center; justify-content: center; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 3px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); font-size: 9px; font-weight: 600; margin-right: 3px; }

/* Consequence overlay */
.consequence { position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 20px; text-align: center; font-size: 13px; font-weight: 600; z-index: 80; animation: conseqSlide 0.3s ease-out, conseqOut 0.3s ease-in 2s forwards; }
@keyframes conseqSlide { from{transform:translateY(100%)} }
@keyframes conseqOut { to{transform:translateY(100%);opacity:0} }
.consequence.chaos { background: rgba(248,113,113,0.15); border-top: 1px solid var(--red); color: var(--red); }
.consequence.win { background: rgba(52,211,153,0.15); border-top: 1px solid var(--green); color: var(--green); }
.consequence.lol { background: rgba(139,92,246,0.15); border-top: 1px solid var(--purple); color: var(--purple); }

/* Toast */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 100; animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 1.5s forwards; white-space: nowrap; }
.toast.good { background: rgba(52,211,153,0.15); border: 1px solid var(--green); color: var(--green); }
.toast.bad { background: rgba(248,113,113,0.15); border: 1px solid var(--red); color: var(--red); }
.toast.neutral { background: rgba(251,191,36,0.15); border: 1px solid var(--yellow); color: var(--yellow); }
@keyframes toastIn { from{transform:translateX(-50%) translateY(-20px);opacity:0} }
@keyframes toastOut { to{transform:translateX(-50%) translateY(-10px);opacity:0} }

/* Combo */
.combo-popup { position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%); font-size: 48px; font-weight: 900; pointer-events: none; z-index: 90; }
.combo-popup.show { animation: comboPop 0.7s ease-out forwards; }
@keyframes comboPop { 0%{opacity:1;transform:translate(-50%,-50%) scale(0.3)} 40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)} 100%{opacity:0;transform:translate(-50%,-70%) scale(1)} }

/* Start */
.start-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.start-title { font-size: 42px; font-weight: 900; letter-spacing: -1px; background: linear-gradient(135deg, var(--blue), var(--purple), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
.start-sub { font-size: 15px; color: var(--text2); margin: 8px 0 24px; }
.rules-card { text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 24px; max-width: 360px; width: 100%; }
.rules-card h3 { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.rule-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 13px; }
.rule-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rule-dot.green { background: var(--green); } .rule-dot.yellow { background: var(--yellow); } .rule-dot.red { background: var(--red); }
.difficulty { display: flex; gap: 8px; margin-bottom: 18px; }
.diff-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.diff-btn.active { background: rgba(74,158,255,0.12); border-color: var(--blue); color: var(--blue); }
.play-btn { padding: 14px 44px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; box-shadow: 0 4px 20px rgba(74,158,255,0.3); }
.play-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(74,158,255,0.4); }
.play-btn:active { transform: translateY(0); }

/* Game over */
.gameover { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: cardEnter 0.5s ease-out; }
.go-emoji { font-size: 56px; margin-bottom: 6px; }
.go-title { font-size: 26px; font-weight: 800; }
.go-score { font-size: 64px; font-weight: 900; background: linear-gradient(135deg, var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; margin: 6px 0; }
.go-rank { font-size: 17px; color: var(--text2); margin-bottom: 16px; }
.go-stats { display: flex; gap: 20px; margin-bottom: 16px; }
.go-stat { text-align: center; } .go-stat-val { font-size: 20px; font-weight: 700; } .go-stat-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.go-streak { font-size: 13px; color: var(--text2); margin-bottom: 6px; line-height: 1.5; }
.go-newspaper { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin: 12px 0 20px; max-width: 360px; }
.go-headline { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.go-byline { font-size: 11px; color: var(--text3); font-style: italic; }

/* Share */
.share-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 200; animation: fadeIn 0.2s; }
@keyframes fadeIn { from{opacity:0} }
.share-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 400px; width: calc(100% - 32px); text-align: center; animation: cardEnter 0.3s ease-out; }
.share-card h3 { font-size: 18px; margin-bottom: 12px; }
.share-text { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; font-size: 12px; line-height: 1.6; text-align: left; color: var(--text); white-space: pre-wrap; }
.share-btns { display: flex; gap: 8px; justify-content: center; margin-top: 14px; }
.share-btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
.share-btn.copy { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; }
.share-btn.close { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.copied-msg { color: var(--green); font-size: 12px; margin-top: 8px; }

/* Daily challenge */
.daily-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(248,113,113,0.15)); border: 1px solid rgba(251,191,36,0.3); color: var(--yellow); margin-bottom: 14px; letter-spacing: 0.3px; }
.daily-badge .daily-num { font-size: 14px; font-weight: 900; }
.mode-tabs { display: flex; gap: 0; margin-bottom: 18px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.mode-tab { flex: 1; padding: 10px 8px; border: none; background: transparent; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.mode-tab + .mode-tab { border-left: 1px solid var(--border); }
.mode-tab.active { background: rgba(74,158,255,0.12); color: var(--blue); }
.mode-tab:hover:not(.active) { background: rgba(255,255,255,0.03); }
.daily-played { text-align: center; padding: 20px; }
.daily-played-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.daily-played-sub { font-size: 13px; color: var(--text2); }
.daily-played-score { font-size: 36px; font-weight: 900; background: linear-gradient(135deg, var(--yellow), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 8px 0; }

/* Emoji grid */
.emoji-grid { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin: 10px 0; }
.emoji-cell { width: 28px; height: 28px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.emoji-cell.correct { background: rgba(52,211,153,0.2); }
.emoji-cell.wrong { background: rgba(248,113,113,0.2); }
.emoji-cell.timeout { background: rgba(107,114,128,0.2); }

/* Score card canvas */
.scorecard-wrap { margin: 12px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.scorecard-wrap canvas { width: 100%; display: block; }
.scorecard-actions { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }

/* Streak calendar */
.streak-info { display: flex; align-items: center; gap: 8px; justify-content: center; margin: 8px 0; font-size: 12px; color: var(--text2); }
.streak-fire { font-size: 16px; }

@media (max-width: 520px) {
  .game-container { padding: 10px; } .start-title { font-size: 32px; } .blocker-text { font-size: 13px; }
  .action-btn { padding: 11px 4px; font-size: 12px; } .kb-hints { display: none; }
  .stats-bar { gap: 4px; } .stat-card { padding: 6px 3px; } .stat-value { font-size: 17px; }
  .stat-label { font-size: 7px; } .avatar { width: 28px; height: 28px; font-size: 10px; }
  .game-title { font-size: 18px; } .go-score { font-size: 52px; }
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="game-container" id="app"></div>
<div class="combo-popup" id="combo"></div>

<script>
// Particles
(function(){const c=document.getElementById("particles");for(let i=0;i<25;i++){const p=document.createElement("div");p.className="particle";p.style.left=Math.random()*100+"%";p.style.animationDuration=(8+Math.random()*12)+"s";p.style.animationDelay=Math.random()*10+"s";p.style.width=p.style.height=(1+Math.random()*2)+"px";c.appendChild(p)}})();

// ── Audio ──
const AC = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq,dur,type="sine",vol=0.07,ramp){
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(AC.destination);if(ramp)ramp(o.frequency,g.gain,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);o.start();o.stop(AC.currentTime+dur);
}
const SFX = {
  slack: ()=>tone(880,0.25,"sine",0.05,(f,g,t)=>{f.setValueAtTime(880,t);f.setValueAtTime(660,t+0.12)}),
  good: ()=>tone(523,0.4,"sine",0.06,(f,g,t)=>{f.setValueAtTime(523,t);f.setValueAtTime(659,t+0.1);f.setValueAtTime(784,t+0.2)}),
  great: ()=>[523,659,784,1047].forEach((freq,i)=>setTimeout(()=>tone(freq,0.3,"sine",0.05),i*70)),
  bad: ()=>tone(350,0.5,"sawtooth",0.04,(f,g,t)=>{f.setValueAtTime(350,t);f.setValueAtTime(250,t+0.15);f.setValueAtTime(180,t+0.3)}),
  trombone: ()=>{[300,280,260,200].forEach((freq,i)=>setTimeout(()=>tone(freq,0.3,"triangle",0.05),i*150))},
  tick: ()=>tone(1200,0.03,"sine",0.03),
  critical: ()=>tone(150,0.6,"square",0.04,(f,g,t)=>{f.setValueAtTime(150,t);f.setValueAtTime(120,t+0.2);f.setValueAtTime(150,t+0.4)}),
  combo: ()=>[660,880,1100,1320].forEach((freq,i)=>setTimeout(()=>tone(freq,0.15,"sine",0.05),i*50)),
  applause: ()=>{for(let i=0;i<8;i++)setTimeout(()=>tone(800+Math.random()*800,0.1,"sine",0.02),i*60)},
  drama: ()=>{tone(100,1.5,"sawtooth",0.03,(f,g,t)=>{f.setValueAtTime(100,t);f.exponentialRampToValueAtTime(200,t+1.5)})},
  victory: ()=>[523,659,784,1047,784,1047].forEach((freq,i)=>setTimeout(()=>tone(freq,0.2,"sine",0.05),i*100)),
  gameOver: ()=>[400,350,300,250,200].forEach((freq,i)=>setTimeout(()=>tone(freq,0.4,"triangle",0.05),i*150)),
  typing: ()=>{for(let i=0;i<5;i++)setTimeout(()=>tone(600+Math.random()*400,0.02,"square",0.02),i*50)},
};

// ── Characters with personality ──
const PEOPLE = [
  { name:"Dev Patel", i:"DP", role:"Senior Engineer", style:"dev", mood:"neutral",
    reactions:{ good:"Nods approvingly", bad:"Sighs deeply", ignore:"Opens LinkedIn tab" }},
  { name:"Sarah Chen", i:"SC", role:"Frontend Lead", style:"lead", mood:"neutral",
    reactions:{ good:"High-fives the screen", bad:"Closes laptop dramatically", ignore:"Starts updating resume" }},
  { name:"Mike O'Brien", i:"MO", role:"DevOps", mood:"neutral", style:"ops",
    reactions:{ good:"'kubectl get pods' intensifies", bad:"Checks PagerDuty nervously", ignore:"Provisions a new cluster out of spite" }},
  { name:"Priya Sharma", i:"PS", role:"QA Lead", style:"qa", mood:"neutral",
    reactions:{ good:"Files a 'works as intended' ticket", bad:"Opens 14 regression tickets", ignore:"Adds 'untested' label to everything" }},
  { name:"Jake Wilson", i:"JW", role:"The Intern", style:"intern", mood:"eager",
    reactions:{ good:"Takes enthusiastic notes", bad:"Googles 'is this normal in tech'", ignore:"Quietly pushes to main" }},
  { name:"Lisa Kim", i:"LK", role:"Product Manager", style:"pm", mood:"neutral",
    reactions:{ good:"Updates the roadmap (again)", bad:"Schedules a retro for the retro", ignore:"Adds it to the backlog abyss" }},
  { name:"CEO", i:"CEO", role:"Chief Everything Officer", style:"ceo", mood:"watching",
    reactions:{ good:"'Great leadership.'", bad:"'We need to talk after this.'", ignore:"Types something ominous in Slack" }},
];

// ── Blockers with escalating absurdity tiers ──
// Tier 1 (rounds 1-4): Normal-ish
// Tier 2 (rounds 5-8): Getting weird
// Tier 3 (rounds 9-12): Unhinged
// Tier 4 (rounds 13+): Reality breaks
const BLOCKERS = [
  // Tier 1 — Relatable
  {t:1, text:"I've been waiting 3 days for a code review. The reviewer is 'working from Bali'.", sev:"high", ans:"resolve",
   consequence:"Dave posts a beach selfie in #general"},

// ── Daily Challenge System ──
function getDailyNumber() {
  const epoch = new Date("2026-04-01").getTime();
  return Math.floor((Date.now() - epoch) / 86400000) + 1;
}

function seededRandom(seed) {
  let s = seed;
  return function() { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; };
}

function getDailyBlockers() {
  const dayNum = getDailyNumber();
  const rng = seededRandom(dayNum * 7919); // prime seed
  const count = 10;
  const pool = [...BLOCKERS];
  const selected = [];
  for (let i = 0; i < count && pool.length > 0; i++) {
    const idx = Math.floor(rng() * pool.length);
    selected.push(pool.splice(idx, 1)[0]);
  }
  return selected;
}

function getDailyState() {
  const key = `standup_daily_${getDailyNumber()}`;
  try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
}

function saveDailyState(result) {
  const key = `standup_daily_${getDailyNumber()}`;
  localStorage.setItem(key, JSON.stringify(result));
}

function getDailyStreak() {
  let streak = 0;
  let day = getDailyNumber();
  while (day > 0) {
    const key = `standup_daily_${day}`;
    try { if (JSON.parse(localStorage.getItem(key))) streak++; else break; } catch(e) { break; }
    day--;
  }
  return streak;
}

// ── Visual Score Card (Canvas) ──
function generateScoreCard() {
  const rank = [...RANKS].reverse().find(r => S.score >= r.min) || RANKS[0];
  const c = document.createElement("canvas");
  c.width = 600; c.height = 400;
  const ctx = c.getContext("2d");

  // Background
  const bg = ctx.createLinearGradient(0, 0, 600, 400);
  bg.addColorStop(0, "#0a0e17"); bg.addColorStop(1, "#131a2b");
  ctx.fillStyle = bg; ctx.fillRect(0, 0, 600, 400);

  // Border glow
  ctx.strokeStyle = "rgba(74,158,255,0.3)"; ctx.lineWidth = 2;
  ctx.roundRect(8, 8, 584, 384, 16); ctx.stroke();

  // Title
  ctx.font = "bold 24px Inter, sans-serif"; ctx.fillStyle = "#e8edf5";
  ctx.textAlign = "center"; ctx.fillText("The Standup Simulator", 300, 48);

  // Rank emoji + title
  ctx.font = "44px serif"; ctx.fillText(rank.e, 300, 100);
  ctx.font = "bold 20px Inter, sans-serif"; ctx.fillStyle = "#7a8ba8";
  ctx.fillText(rank.t, 300, 128);

  // Score
  const scoreGrad = ctx.createLinearGradient(200, 140, 400, 180);
  scoreGrad.addColorStop(0, "#4a9eff"); scoreGrad.addColorStop(1, "#34d399");
  ctx.font = "900 64px Inter, sans-serif"; ctx.fillStyle = scoreGrad;
  ctx.fillText(S.score, 300, 196);

  // Stats boxes
  const stats = [
    { label: "MORALE", value: S.morale + "%", color: S.morale > 60 ? "#34d399" : S.morale > 30 ? "#fbbf24" : "#f87171" },
    { label: "SPRINT", value: S.sprint + "%", color: S.sprint > 60 ? "#4a9eff" : S.sprint > 30 ? "#fbbf24" : "#f87171" },
    { label: "STREAK", value: S.bestStreak + "x", color: "#8b5cf6" },
  ];
  stats.forEach((s, i) => {
    const x = 120 + i * 180;
    ctx.fillStyle = "rgba(255,255,255,0.04)"; ctx.beginPath(); ctx.roundRect(x - 60, 220, 120, 55, 8); ctx.fill();
    ctx.font = "bold 22px Inter, sans-serif"; ctx.fillStyle = s.color; ctx.fillText(s.value, x, 248);
    ctx.font = "bold 9px Inter, sans-serif"; ctx.fillStyle = "#4a5a75"; ctx.fillText(s.label, x, 266);
  });

  // Emoji decision grid
  const decisions = S.decisions || [];
  if (decisions.length > 0) {
    ctx.font = "bold 10px Inter, sans-serif"; ctx.fillStyle = "#4a5a75";
    ctx.fillText("DECISIONS", 300, 298);
    const gridW = decisions.length * 26;
    const startX = 300 - gridW / 2;
    decisions.forEach((d, i) => {
      const x = startX + i * 26;
      ctx.fillStyle = d === "correct" ? "rgba(52,211,153,0.25)" : d === "wrong" ? "rgba(248,113,113,0.25)" : "rgba(107,114,128,0.25)";
      ctx.beginPath(); ctx.roundRect(x, 304, 22, 22, 4); ctx.fill();
      ctx.font = "13px serif";
      ctx.fillStyle = "#e8edf5";
      ctx.fillText(d === "correct" ? "\u2713" : d === "wrong" ? "\u2717" : "\u2022", x + 11, 320);
    });
  }

  // Daily badge or mode
  ctx.font = "bold 11px Inter, sans-serif"; ctx.fillStyle = "#4a5a75";
  const modeText = S.isDaily ? `DAILY #${getDailyNumber()}` : `${S.difficulty.toUpperCase()} MODE`;
  ctx.fillText(modeText, 300, 355);

  // URL
  ctx.font = "11px Inter, sans-serif"; ctx.fillStyle = "#4a5a75";
  ctx.fillText("shikha130vv.github.io/standup-simulator", 300, 378);

  return c;
}

async function shareScoreCard() {
  const canvas = generateScoreCard();
  try {
    const blob = await new Promise(r => canvas.toBlob(r, "image/png"));
    if (navigator.share && navigator.canShare?.({files:[new File([blob],"score.png",{type:"image/png"})]})) {
      await navigator.share({ files: [new File([blob], "standup-score.png", {type:"image/png"})],
        title: "The Standup Simulator", text: "Can you survive daily standup?" });
      return;
    }
  } catch(e) {}
  // Fallback: download
  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a"); a.href = url; a.download = "standup-score.png"; a.click();
  toast("Score card downloaded!", "good");
}

function getTier() {
  const pct = S.round / S.maxRounds;
  if (pct <= 0.3) return 1;
  if (pct <= 0.55) return 2;
  if (pct <= 0.8) return 3;
  return 4;
}

function nextRound() {
  if (S.round >= S.maxRounds || S.morale <= 0 || S.sprint <= 0) { endGame(); return; }
  S.round++;
  S.timeLeft = S.maxTime;
  let b;
  if (S.isDaily && S.dailyBlockers) {
    // Daily mode: use pre-seeded sequence
    b = S.dailyBlockers[S.round - 1] || pick(BLOCKERS);
  } else {
    const tier = getTier();
    const avail = BLOCKERS.filter((bl,i) => bl.t <= tier && !S.used.has(i));
    if (!avail.length) S.used.clear();
    const pool = avail.length ? avail : BLOCKERS.filter(bl => bl.t <= tier);
    b = pick(pool);
    S.used.add(BLOCKERS.indexOf(b));
  }
  S.blocker = b;

  // Pick person — use specified person or random
  if (b.person !== undefined) {
    S.person = PEOPLE[b.person];
    if (b.person === 4) S.internCount++;
    if (b.person === 6) S.ceoCount++;
  } else {
    S.person = pick(PEOPLE.filter(p => p.style !== "ceo"));
  }

  // Narrative context
  if (S.person.style === "ceo" || S.ceoCount === 1) S.narrative = pick(NARRATIVES.ceoAppears);
  else if (S.person.style === "intern" && S.internCount > 1) S.narrative = pick(NARRATIVES.internAgain);
  else if (S.streak >= 5) S.narrative = pick(NARRATIVES.streak5);
  else if (S.streak >= 3) S.narrative = pick(NARRATIVES.streak3);
  else if (S.morale <= 30) S.narrative = pick(NARRATIVES.morale30);
  else if (S.morale <= 50) S.narrative = pick(NARRATIVES.morale50);
  else if (S.sprint <= 30) S.narrative = pick(NARRATIVES.sprint30);
  else if (S.sprint <= 50) S.narrative = pick(NARRATIVES.sprint50);
  else if (b.sev === "critical") S.narrative = pick(NARRATIVES.critical);
  else S.narrative = null;

  clearInterval(S.timer);
  S.timer = setInterval(() => {
    S.timeLeft -= 2;
    const fill = document.getElementById("tf");
    if (fill) { fill.style.width = (S.timeLeft/S.maxTime*100)+"%"; fill.className = "timer-fill"+(S.timeLeft<S.maxTime*0.25?" urgent":""); }
    if (S.timeLeft<=S.maxTime*0.3 && S.timeLeft%10===0) SFX.tick();
    if (S.timeLeft<=0) { clearInterval(S.timer); handleAction("ignore"); }
  }, 200);

  if (b.sev==="critical") { SFX.critical(); setTimeout(SFX.drama, 300); } else SFX.slack();
  render();
}

      <div class="stat-card"><div class="stat-value">${S.streak>1?S.streak+"x":"\u2014"}</div><div class="stat-label">Streak</div></div>
    </div>
    <div class="timer-container"><div class="timer-fill" id="tf" style="width:${S.timeLeft/S.maxTime*100}%"></div></div>
    ${S.narrative?`<div class="narrative">${S.narrative}</div>`:""}
    <div id="slackFeed" class="slack-feed"></div>
    <div class="blocker-card" id="bcard">
      <div class="card-severity ${b.sev}"></div>
      <span class="severity-tag ${b.sev}">${b.sev}</span>
      <div class="blocker-person">
        <div class="avatar ${p.style}">${p.i}</div>
        <div class="person-info"><div class="person-name">${p.name}</div><div class="person-role">${p.role}</div></div>
      </div>
      <div class="blocker-text">${b.text}</div>
      <div class="actions">
        <button class="action-btn resolve" onclick="handleAction('resolve')">Resolve</button>
        <button class="action-btn escalate" onclick="handleAction('escalate')">Escalate</button>
        <button class="action-btn ignore" onclick="handleAction('ignore')">Ignore</button>
      </div>
      <div class="kb-hints"><span><span class="kb-key">1</span> Resolve</span><span><span class="kb-key">2</span> Escalate</span><span><span class="kb-key">3</span> Ignore</span></div>
    </div>`;
}

function handleAction(action) {
  clearInterval(S.timer);
  const b=S.blocker, p=S.person;
  const r = REACTIONS[action][b.sev];
  const isCorrect = action===b.ans;
  const msgs = isCorrect ? r.g : r.b;
  if (!msgs.length) return processResult(false, pick(REACTIONS.ignore[b.sev].b), action);
  processResult(isCorrect, pick(msgs), action);
}

function processResult(isCorrect, msg, action) {
  const pts = parseInt(msg.match(/[+-]\d+/)?.[0]||"0");
  const card = document.getElementById("bcard");
  const b = S.blocker, p = S.person;

  if (isCorrect) {
    S.streak++;
    if (S.streak>S.bestStreak) S.bestStreak=S.streak;
    const bonus = S.streak>=3 ? Math.floor(Math.abs(pts)*0.5) : 0;
    S.score += Math.abs(pts) + bonus;
    S.morale = Math.min(100, S.morale+5);

    // Character reaction
    consequence(`${p.name}: ${p.reactions.good}`, "win");

    if (S.streak>=5) { showCombo(S.streak); SFX.applause(); toast(`${msg} (+${bonus} streak!) The team is in awe.`,"good"); }
    else if (S.streak>=3) { showCombo(S.streak); SFX.great(); toast(`${msg} (+${bonus} bonus!)`,"good"); setTimeout(()=>showSlack("good_streak"),500); }
    else { SFX.good(); toast(msg,"good"); }

    if (b.sev==="critical") setTimeout(()=>showSlack("good_critical"),600);
    document.getElementById("sc-score")?.classList.add("pulse");
  } else {
    S.streak = 0;
    S.score += pts;
    const oldM=S.morale, oldS=S.sprint;
    S.morale = Math.max(0, S.morale-10);
    S.sprint = Math.max(0, S.sprint-(b.sev==="critical"?20:10));

    // Character reaction
    const reaction = action==="ignore" ? p.reactions.ignore : p.reactions.bad;
    consequence(`${p.name}: ${reaction}`, "chaos");

    SFX.trombone();
    toast(msg,"bad");

    // Show consequence of the blocker
    if (b.consequence) setTimeout(()=>consequence(b.consequence,"lol"), 1200);

    if (b.sev==="critical") setTimeout(()=>showSlack("bad_critical"),500);
    if (action==="ignore" && b.sev==="low") setTimeout(()=>showSlack("ignore_low"),400);

    app.classList.add("shake");
    setTimeout(()=>app.classList.remove("shake"),400);
  }

  // Track decision for emoji grid
  if (S.decisions) S.decisions.push(isCorrect ? "correct" : "wrong");

  if (card) card.classList.add("card-exit");
  setTimeout(nextRound, isCorrect ? 500 : 1200);
}

function endGame() {
  S.screen="over"; clearInterval(S.timer);
  const el=document.getElementById("combo"); if(el){el.className="combo-popup";el.textContent="";}

  // Save daily result
  if (S.isDaily) {
    const rank = [...RANKS].reverse().find(r => S.score >= r.min) || RANKS[0];
    saveDailyState({ score: S.score, rank: rank.t, morale: S.morale, sprint: S.sprint,
      bestStreak: S.bestStreak, decisions: S.decisions, difficulty: S.difficulty });
  }

  if (S.score>=350) SFX.victory(); else SFX.gameOver();
  render();
}

function renderOver() {
  const rank=[...RANKS].reverse().find(r=>S.score>=r.min)||RANKS[0];
  const reason = S.morale<=0 ? "Your team quit. They left a passive-aggressive 'All the best!' in #general."
    : S.sprint<=0 ? "The sprint imploded. The Jira board now reads 'ERROR: HOPE_NOT_FOUND'."
    : S.bestStreak>=5 ? `Survived all ${S.maxRounds} rounds with a ${S.bestStreak}x streak. HR wants to study you.`
    : `Survived all ${S.maxRounds} rounds. The retro might even be productive.`;

  // Newspaper headline
  const headlines = S.score>=450 ? { h:"LOCAL SCRUM MASTER DECLARED NATIONAL TREASURE", b:"Sprint velocity up 300%. Team morale at all-time high. Intern still confused." }
    : S.score>=350 ? { h:"STANDUP CONCLUDES ON TIME; WITNESSES SHOCKED", b:"'We didn't even go over,' says traumatized engineer. PM seen crying tears of joy." }
    : S.score>=250 ? { h:"SPRINT SURVIVES DESPITE 'MINOR INCIDENTS'", b:"Management describes catastrophic series of events as 'learning opportunity.'" }
    : S.score>=100 ? { h:"TEAM MORALE AT RECORD LOW; SNACKS BUDGET DOUBLED", b:"'If we can't fix the code, at least we can fix the kitchen,' says defeated PM." }
    : S.score>=0 ? { h:"ENTIRE ENGINEERING TEAM UPDATES LINKEDIN SIMULTANEOUSLY", b:"Recruiters report 400% spike in 'open to work' signals from single IP address." }
    : { h:"SPRINT RETROSPECTIVE ENDS IN TEARS, PIZZA ORDERED", b:"'We'll get 'em next sprint,' says no one, convincingly." };

  app.innerHTML = `<div class="gameover">
    <div class="go-emoji">${rank.e}</div>
    <div class="go-title">Standup Complete!</div>
    <div class="go-score">${S.score}</div>
    <div class="go-rank">${rank.t}</div>
    <div class="go-stats">
      <div class="go-stat"><div class="go-stat-val">${S.morale}%</div><div class="go-stat-lbl">Morale</div></div>
      <div class="go-stat"><div class="go-stat-val">${S.sprint}%</div><div class="go-stat-lbl">Sprint</div></div>
      <div class="go-stat"><div class="go-stat-val">${S.bestStreak}x</div><div class="go-stat-lbl">Best Streak</div></div>
    </div>
    <div class="go-streak">${reason}</div>
    <div class="go-newspaper">
      <div class="go-headline">${headlines.h}</div>
      <div class="go-byline">${headlines.b}</div>
    </div>
    ${S.decisions && S.decisions.length > 0 ? `
      <div style="margin:8px 0">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Decisions</div>
        <div class="emoji-grid">${S.decisions.map(d =>
          `<div class="emoji-cell ${d}">${d==="correct"?"\u2705":d==="wrong"?"\u274c":"\u2b1c"}</div>`
        ).join("")}</div>
      </div>
    ` : ""}
    ${S.isDaily ? `<div class="streak-info"><span class="streak-fire">\ud83d\udd25</span> ${getDailyStreak()}-day streak</div>` : ""}
    <div class="scorecard-wrap"><canvas id="scoreCanvas"></canvas></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px">
      <button class="play-btn" onclick="S.mode='${S.isDaily?"daily":"practice"}';S.screen='start';render()">${S.isDaily?"Back":"Play Again"}</button>
      <button class="play-btn" style="background:linear-gradient(135deg,var(--green),#06b6d4)" onclick="shareScoreCard()">Save Score Card</button>
      <button class="play-btn" style="background:linear-gradient(135deg,var(--yellow),var(--orange))" onclick="shareScore()">Copy for LinkedIn</button>
    </div>
  </div>`;
  // Render score card canvas
  setTimeout(() => {
    const target = document.getElementById("scoreCanvas");
    if (target) {
      const card = generateScoreCard();
      target.width = card.width; target.height = card.height;
      target.getContext("2d").drawImage(card, 0, 0);
    }
  }, 100);
}

function shareScore() {
  const rank=[...RANKS].reverse().find(r=>S.score>=r.min)||RANKS[0];
  const grid = (S.decisions||[]).map(d => d==="correct"?"\u2705":d==="wrong"?"\u274c":"\u2b1c").join("");
  const dailyTag = S.isDaily ? `Daily #${getDailyNumber()} \u2014 ` : "";
  const streakTag = S.isDaily && getDailyStreak() > 1 ? `\n\ud83d\udd25 ${getDailyStreak()}-day streak` : "";
  const text=`${rank.e} The Standup Simulator ${rank.e}\n\n${dailyTag}Score: ${S.score} \u2014 ${rank.t}\n${grid}\nMorale: ${S.morale}% | Sprint: ${S.sprint}% | Streak: ${S.bestStreak}x${streakTag}\n\nCan you survive daily standup?\nhttps://shikha130vv.github.io/standup-simulator/\n\n#StandupSimulator #AgileHumor #ScrumLife`;
  const o=document.createElement("div");o.className="share-overlay";o.onclick=e=>{if(e.target===o)o.remove()};
  o.innerHTML=`<div class="share-card"><h3>Share Your Score</h3><div class="share-text" id="shareText">${text}</div><div class="share-btns"><button class="share-btn copy" onclick="copyShare()">Copy to Clipboard</button><button class="share-btn close" onclick="this.closest('.share-overlay').remove()">Close</button></div><div class="copied-msg" id="copiedMsg" style="display:none">Copied! Paste it on LinkedIn \ud83d\ude80</div></div>`;
  document.body.appendChild(o);
}
function copyShare(){navigator.clipboard.writeText(document.getElementById("shareText").textContent).then(()=>{document.getElementById("copiedMsg").style.display="block";SFX.great()})}

document.addEventListener("keydown",e=>{if(S.screen!=="play")return;if(e.key==="1")handleAction("resolve");else if(e.key==="2")handleAction("escalate");else if(e.key==="3")handleAction("ignore")});

render();
</script>
</body>
</html>
