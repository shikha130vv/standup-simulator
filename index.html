<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Standup Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17; --surface: #131a2b; --card: #1a2236; --border: rgba(255,255,255,0.08);
  --text: #e8edf5; --text2: #7a8ba8; --text3: #4a5a75;
  --blue: #4a9eff; --purple: #8b5cf6; --green: #34d399; --yellow: #fbbf24; --red: #f87171; --orange: #fb923c;
  --glow-blue: rgba(74,158,255,0.15); --glow-green: rgba(52,211,153,0.15); --glow-red: rgba(248,113,113,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* ── Particles background ── */
.particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.particle { position: absolute; width: 2px; height: 2px; background: rgba(74,158,255,0.3); border-radius: 50%; animation: float linear infinite; }
@keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-20px) scale(1); opacity: 0; } }

/* ── Screen shake ── */
.shake { animation: shake 0.4s ease-in-out; }
@keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px) rotate(-1deg); } 40% { transform: translateX(6px) rotate(1deg); } 60% { transform: translateX(-4px); } 80% { transform: translateX(2px); } }

/* ── Layout ── */
.game-container { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; }

/* ── Header ── */
.game-header { text-align: center; padding: 8px 0 12px; }
.game-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.game-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }
.round-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--surface); border: 1px solid var(--border); color: var(--text2); margin-top: 6px; letter-spacing: 0.5px; }

/* ── Stats bar ── */
.stats-bar { display: flex; gap: 8px; margin: 8px 0; }
.stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 8px; text-align: center; transition: all 0.3s; }
.stat-card.pulse { animation: statPulse 0.5s ease; }
@keyframes statPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.stat-value { font-size: 22px; font-weight: 800; color: var(--blue); transition: color 0.3s; }
.stat-value.danger { color: var(--red); }
.stat-value.warning { color: var(--yellow); }
.stat-value.great { color: var(--green); }
.stat-label { font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 2px; }
.stat-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.06); margin-top: 6px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
.stat-bar-fill.morale { background: var(--green); }
.stat-bar-fill.morale.warning { background: var(--yellow); }
.stat-bar-fill.morale.danger { background: var(--red); }
.stat-bar-fill.sprint { background: var(--blue); }
.stat-bar-fill.sprint.warning { background: var(--yellow); }
.stat-bar-fill.sprint.danger { background: var(--red); }

/* ── Timer ── */
.timer-container { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.04); margin: 4px 0 12px; overflow: hidden; }
.timer-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width 0.15s linear; }
.timer-fill.urgent { background: linear-gradient(90deg, var(--red), var(--orange)); animation: timerPulse 0.5s ease-in-out infinite; }
@keyframes timerPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

/* ── Blocker card ── */
.blocker-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; animation: cardEnter 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes cardEnter { 0% { transform: translateY(30px) scale(0.95); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
.card-exit { animation: cardExit 0.3s ease-in forwards; }
@keyframes cardExit { to { transform: translateX(100px) rotate(5deg); opacity: 0; } }
.card-severity { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
.card-severity.critical { background: var(--red); box-shadow: 0 0 12px var(--glow-red); }
.card-severity.high { background: var(--yellow); }
.card-severity.low { background: var(--green); }
.severity-tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.severity-tag.critical { background: rgba(248,113,113,0.12); color: var(--red); }
.severity-tag.high { background: rgba(251,191,36,0.12); color: var(--yellow); }
.severity-tag.low { background: rgba(52,211,153,0.12); color: var(--green); }

.blocker-person { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }
.avatar.dev { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
.avatar.ops { background: linear-gradient(135deg, #f59e0b, #ef4444); }
.avatar.qa { background: linear-gradient(135deg, #10b981, #06b6d4); }
.avatar.pm { background: linear-gradient(135deg, #ec4899, #f43f5e); }
.avatar.intern { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
.avatar.lead { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
.person-info { flex: 1; }
.person-name { font-size: 13px; font-weight: 600; }
.person-role { font-size: 11px; color: var(--text2); }
.blocker-text { font-size: 15px; line-height: 1.6; margin-bottom: 18px; font-weight: 400; overflow-wrap: break-word; word-break: break-word; }

/* ── Action buttons ── */
.actions { display: flex; gap: 8px; }
.action-btn { flex: 1; padding: 11px 8px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px; -webkit-tap-highlight-color: transparent; }
.action-btn:active { transform: scale(0.96); }
.action-btn.resolve { border-color: rgba(52,211,153,0.3); color: var(--green); }
.action-btn.resolve:hover { background: rgba(52,211,153,0.1); border-color: var(--green); box-shadow: 0 0 16px rgba(52,211,153,0.15); }
.action-btn.escalate { border-color: rgba(251,191,36,0.3); color: var(--yellow); }
.action-btn.escalate:hover { background: rgba(251,191,36,0.1); border-color: var(--yellow); box-shadow: 0 0 16px rgba(251,191,36,0.15); }
.action-btn.ignore { border-color: rgba(248,113,113,0.2); color: var(--red); }
.action-btn.ignore:hover { background: rgba(248,113,113,0.08); border-color: var(--red); box-shadow: 0 0 16px rgba(248,113,113,0.1); }

/* ── Keyboard hints ── */
.kb-hints { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 10px; color: var(--text3); }
.kb-hint { display: flex; align-items: center; gap: 4px; }
.kb-key { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 4px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); font-size: 9px; font-weight: 600; }

/* ── Toast notifications ── */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 100; animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 1.5s forwards; white-space: nowrap; }
.toast.good { background: rgba(52,211,153,0.15); border: 1px solid var(--green); color: var(--green); }
.toast.bad { background: rgba(248,113,113,0.15); border: 1px solid var(--red); color: var(--red); }
.toast.neutral { background: rgba(251,191,36,0.15); border: 1px solid var(--yellow); color: var(--yellow); }
@keyframes toastIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } }
@keyframes toastOut { to { transform: translateX(-50%) translateY(-10px); opacity: 0; } }

/* ── Combo popup ── */
.combo-popup { position: fixed; top: 45%; left: 50%; transform: translate(-50%,-50%); font-size: 52px; font-weight: 900; pointer-events: none; z-index: 90; }
.combo-popup.show { animation: comboPop 0.7s ease-out forwards; }
@keyframes comboPop { 0% { opacity: 1; transform: translate(-50%,-50%) scale(0.3); } 40% { opacity: 1; transform: translate(-50%,-50%) scale(1.3); } 100% { opacity: 0; transform: translate(-50%,-70%) scale(1); } }

/* ── Start screen ── */
.start-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.start-title { font-size: 44px; font-weight: 900; letter-spacing: -1px; background: linear-gradient(135deg, var(--blue), var(--purple), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
.start-sub { font-size: 16px; color: var(--text2); margin: 8px 0 28px; }
.rules-card { text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 28px; max-width: 360px; width: 100%; }
.rules-card h3 { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
.rule-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 14px; }
.rule-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rule-dot.green { background: var(--green); }
.rule-dot.yellow { background: var(--yellow); }
.rule-dot.red { background: var(--red); }
.play-btn { padding: 14px 48px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; box-shadow: 0 4px 20px rgba(74,158,255,0.3); }
.play-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(74,158,255,0.4); }
.play-btn:active { transform: translateY(0); }

/* ── Game over ── */
.gameover { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: cardEnter 0.5s ease-out; }
.go-emoji { font-size: 64px; margin-bottom: 8px; }
.go-title { font-size: 28px; font-weight: 800; }
.go-score { font-size: 72px; font-weight: 900; background: linear-gradient(135deg, var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; margin: 8px 0; }
.go-rank { font-size: 18px; color: var(--text2); margin-bottom: 20px; }
.go-stats { display: flex; gap: 20px; margin-bottom: 28px; }
.go-stat { text-align: center; }
.go-stat-val { font-size: 20px; font-weight: 700; }
.go-stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.go-streak { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

/* ── Difficulty selector ── */
.difficulty { display: flex; gap: 8px; margin-bottom: 20px; }
.diff-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.diff-btn.active { background: var(--glow-blue); border-color: var(--blue); color: var(--blue); }
.diff-btn:hover:not(.active) { border-color: rgba(255,255,255,0.15); }

@media (max-width: 520px) {
  .game-container { padding: 10px; }
  .start-title { font-size: 32px; }
  .blocker-text { font-size: 13px; line-height: 1.5; margin-bottom: 14px; }
  .action-btn { padding: 12px 6px; font-size: 12px; }
  .kb-hints { display: none; }
  .stats-bar { gap: 4px; }
  .stat-card { padding: 8px 4px; }
  .stat-value { font-size: 18px; }
  .stat-label { font-size: 8px; }
  .blocker-card { padding: 14px; }
  .severity-tag { font-size: 9px; padding: 2px 8px; }
  .person-name { font-size: 12px; }
  .person-role { font-size: 10px; }
  .avatar { width: 30px; height: 30px; font-size: 11px; }
  .game-title { font-size: 20px; }
  .round-badge { font-size: 10px; }
  .actions { gap: 6px; }
}

/* ── Share modal ── */
.share-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 200; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; } }
.share-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; max-width: 400px; width: calc(100% - 32px); text-align: center; animation: cardEnter 0.3s ease-out; }
.share-card h3 { font-size: 18px; margin-bottom: 12px; }
.share-text { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-size: 13px; line-height: 1.6; text-align: left; margin-bottom: 16px; color: var(--text); white-space: pre-wrap; }
.share-btns { display: flex; gap: 8px; justify-content: center; }
.share-btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
.share-btn.copy { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; }
.share-btn.copy:hover { opacity: 0.9; }
.share-btn.close { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.share-btn.close:hover { border-color: var(--text2); }
.copied-msg { color: var(--green); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="game-container" id="app"></div>
<div class="combo-popup" id="combo"></div>

<script>
// ── Particle background ──
(function() {
  const c = document.getElementById("particles");
  for (let i = 0; i < 30; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "%";
    p.style.animationDuration = (8 + Math.random() * 12) + "s";
    p.style.animationDelay = Math.random() * 10 + "s";
    p.style.width = p.style.height = (1 + Math.random() * 2) + "px";
    c.appendChild(p);
  }
})();

// ── Audio engine ──
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, dur, type="sine", vol=0.08, ramp) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq; g.gain.value = vol;
  o.connect(g); g.connect(AC.destination);
  if (ramp) ramp(o.frequency, g.gain, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}

const SFX = {
  slack: () => { playTone(880, 0.25, "sine", 0.06, (f,g,t) => { f.setValueAtTime(880,t); f.setValueAtTime(660,t+0.12); }); },
  good: () => { playTone(523, 0.4, "sine", 0.07, (f,g,t) => { f.setValueAtTime(523,t); f.setValueAtTime(659,t+0.1); f.setValueAtTime(784,t+0.2); }); },
  great: () => { [523,659,784,1047].forEach((freq,i) => setTimeout(() => playTone(freq, 0.3, "sine", 0.06), i*80)); },
  bad: () => { playTone(350, 0.5, "sawtooth", 0.05, (f,g,t) => { f.setValueAtTime(350,t); f.setValueAtTime(250,t+0.15); f.setValueAtTime(180,t+0.3); }); },
  tick: () => playTone(1200, 0.03, "sine", 0.03),
  critical: () => { playTone(150, 0.6, "square", 0.04, (f,g,t) => { f.setValueAtTime(150,t); f.setValueAtTime(120,t+0.2); f.setValueAtTime(150,t+0.4); }); },
  combo: () => { [660,880,1100,1320].forEach((freq,i) => setTimeout(() => playTone(freq, 0.15, "sine", 0.05), i*50)); },
  gameOver: () => { [400,350,300,250,200].forEach((freq,i) => setTimeout(() => playTone(freq, 0.4, "triangle", 0.06), i*150)); },
  victory: () => { [523,659,784,1047,784,1047].forEach((freq,i) => setTimeout(() => playTone(freq, 0.2, "sine", 0.06), i*100)); },
};

// ── Data ──
const PEOPLE = [
  { name: "Dev Patel", initials: "DP", role: "Senior Engineer", style: "dev" },
  { name: "Sarah Chen", initials: "SC", role: "Frontend Lead", style: "lead" },
  { name: "Mike O'Brien", initials: "MO", role: "DevOps", style: "ops" },
  { name: "Priya Sharma", initials: "PS", role: "QA Lead", style: "qa" },
  { name: "Jake Wilson", initials: "JW", role: "The Intern", style: "intern" },
  { name: "Lisa Kim", initials: "LK", role: "Product Manager", style: "pm" },
  { name: "Alex Rivera", initials: "AR", role: "Backend Lead", style: "dev" },
  { name: "Emma Watson", initials: "EW", role: "UX Designer", style: "pm" },
];

const BLOCKERS = [
  // CRITICAL
  { text: "The CI/CD pipeline has become sentient and is rejecting PRs it finds 'aesthetically unpleasing'.", severity: "critical", correct: "escalate" },
  { text: "Someone deployed to production on a Friday at 4:59 PM. It was me. I'm sorry.", severity: "critical", correct: "resolve" },
  { text: "The database is returning data from the future. Our time-series queries show next week's sales.", severity: "critical", correct: "escalate" },
  { text: "AWS sent us a bill for $47,000. Turns out someone left a GPU instance mining... training data.", severity: "critical", correct: "escalate" },

const REACTIONS = {
  resolve: {
    critical: { good: ["+35! Crisis averted!", "+30! You saved production!"], bad: ["-15! That needed leadership attention!"] },
    high: { good: ["+20! Unblocked the team!", "+15! Solid fix!"], bad: ["-10! Should've escalated."] },

    low: { good: ["+5! Playing it safe."], bad: ["-15! Don't waste leadership's time!"] },
  },

    high: { good: [], bad: ["-20! The team is blocked!", "-15! This will bite you."] },
    low: { good: ["+15! Not worth the time.", "+10! Priorities!"], bad: ["-5! Could've been a quick fix."] },
  },
};

const RANKS = [
  { min: -999, title: "Chaos Agent", emoji: "💥" },
  { min: 0, title: "Chaos Coordinator", emoji: "🔥" },
  { min: 80, title: "Standup Survivor", emoji: "😅" },
  { min: 160, title: "Blocker Buster", emoji: "💪" },
  { min: 250, title: "Sprint Sage", emoji: "🧙" },
  { min: 350, title: "Agile Alchemist", emoji: "⚗️" },
  { min: 450, title: "Scrum Lord", emoji: "👑" },
];

const DIFFICULTIES = { easy: { rounds: 8, timer: 140 }, normal: { rounds: 12, timer: 100 }, hard: { rounds: 15, timer: 70 } };

// ── State ──
let S = { screen: "start", difficulty: "normal" };
const app = document.getElementById("app");

function toast(msg, type) {
  const t = document.createElement("div");
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function showCombo(streak) {
  if (S.screen !== "play") return;
  const el = document.getElementById("combo");
  el.textContent = `${streak}x STREAK!`;
  el.style.background = `linear-gradient(135deg, var(--green), var(--blue))`;
  el.style.webkitBackgroundClip = "text";
  el.style.webkitTextFillColor = "transparent";
  el.className = "combo-popup show";
  SFX.combo();
  setTimeout(() => { el.className = "combo-popup"; el.textContent = ""; }, 700);
}

function render() {
  if (S.screen === "start") renderStart();
  else if (S.screen === "play") renderPlay();
  else if (S.screen === "over") renderOver();
}

// ── Start Screen ──
function renderStart() {
  app.innerHTML = `
    <div class="start-screen">
      <div class="start-title">The Standup<br>Simulator</div>
      <div class="start-sub">Can you survive daily standup?</div>
      <div class="difficulty">
        <button class="diff-btn ${S.difficulty==="easy"?"active":""}" onclick="S.difficulty='easy';render()">Easy</button>
        <button class="diff-btn ${S.difficulty==="normal"?"active":""}" onclick="S.difficulty='normal';render()">Normal</button>
        <button class="diff-btn ${S.difficulty==="hard"?"active":""}" onclick="S.difficulty='hard';render()">Hard</button>
      </div>
      <div class="rules-card">
        <h3>How to play</h3>
        <div class="rule-item"><div class="rule-dot green"></div><strong>Resolve</strong>&nbsp;\u2014 Handle it yourself &nbsp;<span class="kb-key">1</span></div>
        <div class="rule-item"><div class="rule-dot yellow"></div><strong>Escalate</strong>&nbsp;\u2014 Pass to leadership &nbsp;<span class="kb-key">2</span></div>
        <div class="rule-item"><div class="rule-dot red"></div><strong>Ignore</strong>&nbsp;\u2014 Not worth your time &nbsp;<span class="kb-key">3</span></div>
      </div>
      <button class="play-btn" onclick="startGame()">Start Standup</button>
    </div>`;
}

// ── Game ──
function startGame() {
  const cfg = DIFFICULTIES[S.difficulty];
  S = { ...S, screen: "play", score: 0, round: 0, maxRounds: cfg.rounds, morale: 100, sprint: 100,
    timeLeft: cfg.timer, maxTime: cfg.timer, streak: 0, bestStreak: 0, timer: null, used: new Set(),
    blocker: null, person: null };
  nextRound();
}

function nextRound() {
  if (S.round >= S.maxRounds || S.morale <= 0 || S.sprint <= 0) { endGame(); return; }
  S.round++;
  S.timeLeft = S.maxTime;
  // Pick random blocker + person
  const avail = BLOCKERS.filter((_, i) => !S.used.has(i));
  if (!avail.length) S.used.clear();
  const bi = BLOCKERS.indexOf(avail[Math.floor(Math.random() * avail.length)]);
  S.used.add(bi);
  S.blocker = BLOCKERS[bi];
  S.person = PEOPLE[Math.floor(Math.random() * PEOPLE.length)];
  clearInterval(S.timer);
  S.timer = setInterval(() => {
    S.timeLeft -= 2;
    const fill = document.getElementById("tf");
    if (fill) {
      fill.style.width = (S.timeLeft / S.maxTime * 100) + "%";
      fill.className = "timer-fill" + (S.timeLeft < S.maxTime * 0.25 ? " urgent" : "");
    }
    if (S.timeLeft <= S.maxTime * 0.3 && S.timeLeft % 10 === 0) SFX.tick();
    if (S.timeLeft <= 0) { clearInterval(S.timer); handleAction("ignore"); }
  }, 200);
  if (S.blocker.severity === "critical") SFX.critical(); else SFX.slack();
  render();
}

function renderPlay() {
  const b = S.blocker, p = S.person;
  const mc = S.morale > 60 ? "great" : S.morale > 30 ? "warning" : "danger";
  const sc = S.sprint > 60 ? "great" : S.sprint > 30 ? "warning" : "danger";
  app.innerHTML = `
    <div class="game-header">
      <div class="game-title">The Standup Simulator</div>
      <div class="round-badge">ROUND ${S.round} / ${S.maxRounds}</div>
    </div>
    <div class="stats-bar">
      <div class="stat-card" id="sc-score"><div class="stat-value">${S.score}</div><div class="stat-label">Score</div></div>
      <div class="stat-card" id="sc-morale"><div class="stat-value ${mc}">${S.morale}%</div><div class="stat-label">Morale</div>
        <div class="stat-bar"><div class="stat-bar-fill morale ${mc}" style="width:${S.morale}%"></div></div></div>
      <div class="stat-card" id="sc-sprint"><div class="stat-value ${sc}">${S.sprint}%</div><div class="stat-label">Sprint</div>
        <div class="stat-bar"><div class="stat-bar-fill sprint ${sc}" style="width:${S.sprint}%"></div></div></div>
      <div class="stat-card"><div class="stat-value">${S.streak > 1 ? S.streak + "x" : "\u2014"}</div><div class="stat-label">Streak</div></div>
    </div>
    <div class="timer-container"><div class="timer-fill" id="tf" style="width:${S.timeLeft/S.maxTime*100}%"></div></div>
    <div class="blocker-card" id="bcard">
      <div class="card-severity ${b.severity}"></div>
      <span class="severity-tag ${b.severity}">${b.severity}</span>
      <div class="blocker-person">
        <div class="avatar ${p.style}">${p.initials}</div>
        <div class="person-info"><div class="person-name">${p.name}</div><div class="person-role">${p.role}</div></div>
      </div>
      <div class="blocker-text">${b.text}</div>
      <div class="actions">
        <button class="action-btn resolve" onclick="handleAction('resolve')">Resolve</button>
        <button class="action-btn escalate" onclick="handleAction('escalate')">Escalate</button>
        <button class="action-btn ignore" onclick="handleAction('ignore')">Ignore</button>
      </div>
      <div class="kb-hints">
        <div class="kb-hint"><span class="kb-key">1</span> Resolve</div>
        <div class="kb-hint"><span class="kb-key">2</span> Escalate</div>
        <div class="kb-hint"><span class="kb-key">3</span> Ignore</div>
      </div>
    </div>`;
}

function handleAction(action) {
  clearInterval(S.timer);
  const b = S.blocker;
  const reactions = REACTIONS[action][b.severity];
  const isCorrect = action === b.correct;
  const msgs = isCorrect ? reactions.good : reactions.bad;
  if (!msgs.length) { // ignore critical with no good msgs
    const fallback = REACTIONS.ignore[b.severity].bad;
    return processResult(false, fallback[0]);
  }
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  processResult(isCorrect, msg);
}

function processResult(isCorrect, msg) {
  const pts = parseInt(msg.match(/[+-]\d+/)?.[0] || "0");
  const card = document.getElementById("bcard");

  if (isCorrect) {
    S.streak++;
    if (S.streak > S.bestStreak) S.bestStreak = S.streak;
    const bonus = S.streak >= 3 ? Math.floor(pts * 0.5) : 0;
    S.score += pts + bonus;
    S.morale = Math.min(100, S.morale + 5);
    if (S.streak >= 5) { showCombo(S.streak); SFX.great(); toast(msg + ` (+${bonus} streak!) You're on fire!`, "good"); }
    else if (S.streak >= 3) { showCombo(S.streak); SFX.great(); toast(msg + (bonus ? ` (+${bonus} streak bonus!)` : ""), "good"); }
    else { SFX.good(); toast(msg, "good"); }
    document.getElementById("sc-score")?.classList.add("pulse");
  } else {
    S.streak = 0;
    S.score += pts;
    const oldMorale = S.morale;
    S.morale = Math.max(0, S.morale - 10);
    S.sprint = Math.max(0, S.sprint - (S.blocker.severity === "critical" ? 20 : 10));
    SFX.bad();
    // Easter egg warnings at morale thresholds
    if (oldMorale > 30 && S.morale <= 30) toast("Team is updating their LinkedIn profiles...", "neutral");
    else if (oldMorale > 50 && S.morale <= 50) toast("Someone just Slacked 'is this company hiring?'", "neutral");
    else toast(msg, "bad");
    app.classList.add("shake");
    setTimeout(() => app.classList.remove("shake"), 400);
  }

  if (card) card.classList.add("card-exit");
  setTimeout(nextRound, 500);
}

function endGame() {
  S.screen = "over";
  clearInterval(S.timer);
  // Hide any lingering combo popup
  const comboEl = document.getElementById("combo");
  if (comboEl) { comboEl.className = "combo-popup"; comboEl.textContent = ""; }
  if (S.score >= 350) SFX.victory(); else SFX.gameOver();
  render();
}

function renderOver() {
  const rank = [...RANKS].reverse().find(r => S.score >= r.min) || RANKS[0];
  const reason = S.morale <= 0 ? "Your team quit. HR is drafting the exit interviews."
    : S.sprint <= 0 ? "The sprint imploded. Retro is going to be... interesting."
    : S.bestStreak >= 5 ? `Survived all ${S.maxRounds} rounds with a ${S.bestStreak}x streak! Are you even human?`
    : `Survived all ${S.maxRounds} rounds!`;

  // Easter egg messages based on performance
  const easter = S.score >= 450 ? "Your LinkedIn recruiter DMs just tripled."
    : S.score >= 350 ? "The PM wants to know if you can also fix the roadmap."
    : S.score >= 250 ? "Not bad. The team only cried twice."
    : S.score >= 100 ? "At least you showed up. That's more than Jake."
    : S.score >= 0 ? "The intern could've done better. Just saying."
    : "Congratulations, you've been voluntold for on-call duty.";

  app.innerHTML = `
    <div class="gameover">
      <div class="go-emoji">${rank.emoji}</div>
      <div class="go-title">Standup Complete!</div>
      <div class="go-score">${S.score}</div>
      <div class="go-rank">${rank.title}</div>
      <div class="go-stats">
        <div class="go-stat"><div class="go-stat-val">${S.morale}%</div><div class="go-stat-lbl">Morale</div></div>
        <div class="go-stat"><div class="go-stat-val">${S.sprint}%</div><div class="go-stat-lbl">Sprint</div></div>
        <div class="go-stat"><div class="go-stat-val">${S.bestStreak}x</div><div class="go-stat-lbl">Best Streak</div></div>
      </div>
      <div class="go-streak">${reason}</div>
      <div class="go-streak" style="font-style:italic;color:var(--purple);margin-top:4px">"${easter}"</div>
      <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;justify-content:center">
        <button class="play-btn" onclick="S.screen='start';render()">Play Again</button>
        <button class="play-btn" style="background:linear-gradient(135deg,var(--green),#06b6d4)" onclick="shareScore()">Share Score</button>
      </div>
    </div>`;
}

function shareScore() {
  const rank = [...RANKS].reverse().find(r => S.score >= r.min) || RANKS[0];
  const bars = (val) => {
    const full = Math.round(val / 10);
    return "\u2588".repeat(full) + "\u2591".repeat(10 - full);
  };
  const text = `${rank.emoji} The Standup Simulator ${rank.emoji}

Score: ${S.score} \u2014 ${rank.title}
Morale: ${bars(S.morale)} ${S.morale}%
Sprint: ${bars(S.sprint)} ${S.sprint}%
Streak: ${S.bestStreak}x | Difficulty: ${S.difficulty}

Can you survive daily standup? \ud83d\ude02

#TheStandupSimulator #AgileHumor #ScrumLife`;

  const overlay = document.createElement("div");
  overlay.className = "share-overlay";
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="share-card">
      <h3>Share Your Score</h3>
      <div class="share-text" id="shareText">${text}</div>
      <div class="share-btns">
        <button class="share-btn copy" onclick="copyShare()">Copy to Clipboard</button>
        <button class="share-btn close" onclick="this.closest('.share-overlay').remove()">Close</button>
      </div>
      <div class="copied-msg" id="copiedMsg" style="display:none">Copied! Paste it on LinkedIn \ud83d\ude80</div>
    </div>`;
  document.body.appendChild(overlay);
}

function copyShare() {
  const text = document.getElementById("shareText").textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById("copiedMsg").style.display = "block";
    SFX.great();
  });
}

// ── Keyboard support ──
document.addEventListener("keydown", (e) => {
  if (S.screen !== "play") return;
  if (e.key === "1") handleAction("resolve");
  else if (e.key === "2") handleAction("escalate");
  else if (e.key === "3") handleAction("ignore");
});

render();
</script>
</body>
</html>
